.wstat .gd{display:inline-flex;align-items:center;gap:5px}.wstat .ti{font-size:12px;color:var(--i40)}
.kpibar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--hair);border:1px solid var(--hair);border-radius:8px;overflow:hidden;margin-bottom:18px}

.split{display:grid;grid-template-columns:minmax(0,1fr) 372px;gap:16px;align-items:start}
.panel{background:var(--surface);border:1px solid var(--hair);border-radius:8px;overflow:hidden}
.ptitle{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--hair);font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--i55)}

td{padding:9px 14px;border-bottom:1px solid var(--hair);font-size:13.5px;vertical-align:middle}
tbody tr:last-child td{border-bottom:0}
.selectable{cursor:pointer;transition:background .12s}
tbody tr.selectable:nth-child(even){background:var(--zebra)}
tbody tr.selectable:hover{background:var(--tint)}
.selectable.sel{background:var(--sel) !important;box-shadow:inset 3px 0 0 0 var(--accent)}
.nm{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink)}

.on{color:var(--ok);background:var(--okbg)}.off{color:var(--i55);background:var(--tint)}

.pc.claude{color:var(--i55);background:var(--tint)}.pc.codex{color:var(--info);background:var(--infobg)}
.kswitch{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--hair);overflow-x:auto}
.kbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid transparent;background:transparent;color:var(--i55);font-size:12.5px;font-weight:500;padding:6px 11px;border-radius:7px;white-space:nowrap}
.kbtn .ti{font-size:16px;color:var(--i40)}
.kbtn .kn{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--i40);font-variant-numeric:tabular-nums}
.kbtn:hover{background:var(--tint);color:var(--ink)}.kbtn:hover .ti{color:var(--kc)}
.kbtn.on{background:color-mix(in srgb,var(--kc) 14%,transparent);border-color:color-mix(in srgb,var(--kc) 36%,var(--hair2));color:var(--ink)}
.kbtn.on .ti{color:var(--kc)}
.kbadge{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--i55)}
.kbadge .ti{font-size:15px;color:var(--kc)}
/* INSPECTOR */
.insp{padding:0}
@media (min-width:900px){.split .insp{position:sticky;top:0;align-self:start;max-height:calc(100vh - 124px);overflow:auto}}
.iempty{padding:32px 18px;text-align:center;color:var(--i40);font-size:12.5px;display:flex;flex-direction:column;align-items:center;gap:9px}
.iempty .ti{font-size:24px;color:var(--hair2)}
.dhead{padding:14px 16px;border-bottom:1px solid var(--hair)}
.dname{font-family:'JetBrains Mono',monospace;font-size:14.5px;font-weight:500;color:var(--ink);word-break:break-all}
.dsub{display:flex;align-items:center;gap:7px;margin-top:8px;flex-wrap:wrap}
.b{font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:5px}
.b.src,.b.kindb{color:var(--i55);background:var(--tint)}
.dpath{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--i55);margin-top:9px;word-break:break-all}
.ddesc{padding:13px 16px;font-size:13px;color:var(--i70);border-bottom:1px solid var(--hair);line-height:1.55}
.dsec{padding:12px 16px;border-bottom:1px solid var(--hair)}
.dsec:last-child{border-bottom:0}
.dsec-t{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--i40);margin-bottom:9px}
.drow{display:flex;justify-content:space-between;gap:12px;padding:4px 0;font-size:13px}
.dk{color:var(--i55)}.dv{color:var(--ink);text-align:right;word-break:break-word}.dv.mono{font-family:'JetBrains Mono',monospace;font-size:11.5px}
.dv.miss{color:var(--i40)}
.conf{display:flex;align-items:flex-start;gap:8px;font-size:12px;line-height:1.45}.conf.ok{color:var(--ok)}.conf.warn{color:var(--warn)}
.vseg{display:flex;border:1px solid var(--hair2);border-radius:7px;overflow:hidden;flex-wrap:wrap}
.vseg button{flex:1;min-width:62px;border:0;border-right:1px solid var(--hair2);border-radius:0;font-size:11px;padding:7px 6px;color:var(--i55);background:transparent}
.vseg button:last-child{border-right:0}.vseg button.on{background:var(--ink);color:var(--bg)}.vseg button:hover:not(.on){background:var(--tint)}
.code{font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55;background:var(--bg);border:1px solid var(--hair);border-radius:6px;padding:11px;overflow:auto;max-height:130px;white-space:pre;color:var(--i70);margin-top:8px}
.dacts{display:flex;gap:7px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--hair)}
.iact{font-size:11.5px;font-weight:500;padding:7px 11px;border-radius:6px;color:var(--i70);min-height:32px;display:inline-flex;align-items:center;gap:5px}
.iact:hover{background:var(--tint)}.iact.danger{color:var(--danger);border-color:color-mix(in srgb,var(--danger) 45%,var(--hair2))}.iact.danger:hover{background:color-mix(in srgb,var(--danger) 10%,transparent)}
.dpv{padding:12px 16px}.dpv:empty{display:none}
.pvh{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.diff{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.55;border-radius:6px;overflow:hidden;border:1px solid var(--hair)}
.dl{padding:4px 10px;white-space:pre}
.ctx{color:var(--i55);background:var(--bg)}.del{color:var(--danger);background:color-mix(in srgb,var(--danger) 12%,transparent)}.add{color:var(--ok);background:var(--okbg)}
.note{font-size:11px;color:var(--i55);margin:9px 0 12px;display:flex;align-items:flex-start;gap:6px;line-height:1.45}
.btns{display:flex;gap:7px}.btn{font-size:11.5px;font-weight:500;padding:7px 12px;border-radius:6px;min-height:32px;display:inline-flex;align-items:center;gap:5px}
.btn.ghost{color:var(--i55)}.btn.ghost:hover{background:var(--tint)}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.ok2{font-size:12.5px;color:var(--ok);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.snap{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--i55);background:var(--tint);padding:2px 6px;border-radius:4px}
.cmp-row{padding:11px 14px;border-bottom:1px solid var(--hair)}.cmp-row:last-child{border-bottom:0}
.cmp-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px}.cmp-top .nm2{font-weight:500;color:var(--ink)}.cmp-top .ct{font-size:11.5px;color:var(--i55);font-variant-numeric:tabular-nums}
.bar{display:flex;height:13px;border-radius:7px;overflow:hidden;background:var(--tint)}.seg{height:100%;transform-origin:left}
.leg{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--i55)}.sw{width:9px;height:9px;border-radius:2px}
.divrow{display:flex;align-items:center;gap:11px;padding:9px 14px;border-bottom:1px solid var(--hair);font-size:13px}.divrow:last-child{border-bottom:0}.divrow:nth-child(even){background:var(--zebra)}
.divrow .dkind{font-size:10.5px;color:var(--i40);min-width:58px;text-transform:uppercase;letter-spacing:.04em}
.divrow .pc{margin-left:auto}
.health{display:flex;align-items:center;gap:24px;padding:18px;flex-wrap:wrap}
.gauge{position:relative;width:104px;height:104px;flex:none}
.gauge .score{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge .score b{font-size:27px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.gauge .score span{font-size:10px;color:var(--i55);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.sev{display:flex;gap:20px}.sev b{font-size:20px;font-weight:600;font-variant-numeric:tabular-nums}.sev span{font-size:11px;color:var(--i55);display:block}
.chk{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--hair);font-size:12.5px}.chk:last-child{border-bottom:0}.chk:nth-child(even){background:var(--zebra)}
.chk .id{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--i55);min-width:30px}.chk .ico{font-size:16px}
.snaprow{display:flex;align-items:center;gap:11px;padding:10px 14px;border-bottom:1px solid var(--hair);font-size:12.5px}.snaprow:last-child{border-bottom:0}.snaprow:nth-child(even){background:var(--zebra)}
.snaprow .op{color:var(--i70)}.snaprow .when{color:var(--i55);font-size:11px;margin-left:auto;font-family:'JetBrains Mono',monospace}
.flist{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--i70)}.flist div{padding:3px 0}
button:focus-visible,input:focus-visible,.selectable:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
@media (max-width:900px){
 .ws{grid-template-columns:58px 1fr}
 .brand span,.nav button span,.targets button span,.nlabel,.lang,.ssearch input,.ssearch kbd,.nav .meta,.targets .cnt,.gate span{display:none}
 .ssearch{justify-content:center}.nav button,.targets button{justify-content:center;padding:9px 0}.split{grid-template-columns:1fr}
}
</style>

 /* ===== COMPARE ===== */
 function compareView(){
  var bars=CMPBARS.map(function(r){var tot=r[1]+r[2]+r[3]||1,p=function(x){return (x/tot*100).toFixed(1);};return '<div class="cmp-row"><div class="cmp-top"><span class="nm2">'+r[0]+'</span><span class="ct">'+r[1]+' · '+r[2]+' · '+r[3]+'</span></div><div class="bar"><div class="seg" style="width:'+p(r[1])+'%;background:var(--i40)"></div><div class="seg" style="width:'+p(r[2])+'%;background:var(--ok)"></div><div class="seg" style="width:'+p(r[3])+'%;background:var(--info)"></div></div></div>';}).join('');
  var summary='<div class="panel" style="margin-bottom:18px"><div class="ptitle"><span>'+t('byKind')+'</span><span class="legs"><span class="leg"><span class="sw" style="background:var(--i40)"></span>'+t('conly')+'</span><span class="leg"><span class="sw" style="background:var(--ok)"></span>'+t('both')+'</span><span class="leg"><span class="sw" style="background:var(--info)"></span>'+t('xonly')+'</span></span></div>'+bars+'</div>';
  var rows=DIV.map(function(it,i){return '<div class="divrow selectable" data-kind="cmp" data-id="'+i+'"><span class="dkind">'+it.k+'</span><span class="nm">'+it.n+'</span><span class="pc '+it.p+'">'+(it.p==='claude'?t('conly'):t('xonly'))+'</span></div>';}).join('');
  var master='<div class="ptitle"><span>'+t('divItems')+'</span><span class="cnt2">'+DIV.length+'</span></div>'+rows;
  return summary+split(master,empty('ti-git-compare',t('selItem')));
 }
 function cmpDetail(i){var it=DIV[+i];var hasC=it.p==='claude',hasX=it.p==='codex';
  return '<div class="dhead"><div class="dname">'+it.n+'</div><div class="dsub"><span class="b kindb">'+it.k+'</span><span class="pc '+it.p+'">'+(it.p==='claude'?t('conly'):t('xonly'))+'</span></div></div>'
   +'<div class="dsec"><div class="dsec-t">'+t('presence')+'</div><div class="drow"><span class="dk mono">claude</span><span class="dv">'+(hasC?'<span class="conf ok"><i class="ti ti-check"></i></span>':'<span class="dv miss">—</span>')+'</span></div><div class="drow"><span class="dk mono">codex</span><span class="dv">'+(hasX?'<span class="conf ok"><i class="ti ti-check"></i></span>':'<span class="dv miss">—</span>')+'</span></div></div>'
   +'<div class="dsec"><div class="dsec-t">path</div><div class="dpath" style="margin:0">'+esc(it.path)+'</div></div>'
   +'<div class="dsec"><div class="conf warn"><i class="ti ti-info-circle" aria-hidden="true"></i><span>'+t('caveat')+'</span></div></div>';
 }
 /* ===== DOCTOR ===== */
 function doctorView(){
  var C=2*Math.PI*46;
  var summary='<div class="panel" style="margin-bottom:18px"><div class="health"><div class="gauge"><svg viewBox="0 0 104 104" width="104" height="104" aria-hidden="true"><circle cx="52" cy="52" r="46" fill="none" stroke="var(--tint)" stroke-width="10"/><circle id="arc" cx="52" cy="52" r="46" fill="none" stroke="var(--ok)" stroke-width="10" stroke-linecap="round" transform="rotate(-90 52 52)" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+C.toFixed(1)+'"/></svg><div class="score"><b data-count="92">0</b><span>'+t('health')+'</span></div></div><div class="sev"><div><b style="color:var(--danger)" data-count="0">0</b><span>'+t('error')+'</span></div><div><b style="color:var(--warn)" data-count="2">0</b><span>'+t('warn')+'</span></div><div><b style="color:var(--ok)" data-count="27">0</b><span>'+t('pass')+'</span></div></div></div></div>';
  var rows=CHK.map(function(c){var w=c.sev===1;return '<div class="chk selectable" data-kind="chk" data-id="'+c.id+'"><i class="ti '+(w?'ti-alert-triangle':'ti-circle-check')+' ico" style="color:'+(w?'var(--warn)':'var(--ok)')+'" aria-hidden="true"></i><span class="id">#'+c.id+'</span><span class="nm" style="flex:1">'+c.title+'</span><span class="st '+(w?'off':'on')+'" '+(w?'style="color:var(--warn)"':'')+'>'+(w?t('warn'):t('pass'))+'</span></div>';}).join('');
  var master='<div class="ptitle"><span>'+t('checks')+'</span><span class="cnt2">29</span></div>'+rows;
  return summary+split(master,empty('ti-stethoscope',t('selCheck')));
 }
 function chkDetail(id){var c=CHK.filter(function(x){return x.id===id;})[0];if(!c)return '';var w=c.sev===1;
  return '<div class="dhead"><div class="dname" style="font-size:13.5px">#'+c.id+' · '+c.title+'</div><div class="dsub"><span class="st '+(w?'off':'on')+'" '+(w?'style="color:var(--warn)"':'')+'><i class="ti '+(w?'ti-alert-triangle':'ti-circle-check')+'" aria-hidden="true"></i>'+(w?t('warn'):t('pass'))+'</span></div></div>'
   +'<div class="dsec"><div class="dsec-t">'+t('whatChecks')+'</div><div style="font-size:12.5px;color:var(--i70);line-height:1.5">'+esc(c.desc)+'</div></div>'
   +'<div class="dsec"><div class="dsec-t">'+t('finding')+'</div><div style="font-size:12.5px;color:var(--ink);line-height:1.5">'+esc(c.msg)+'</div></div>'
   +(c.fix?'<div class="dsec"><div class="dsec-t">'+t('fix')+'</div><div style="font-size:12.5px;color:var(--i70);line-height:1.5">'+esc(c.fix)+'</div></div>':'')
   +'<div class="dsec"><div class="dsec-t">path</div><div class="dpath" style="margin:0">'+esc(c.path)+'</div></div>';
 }
 /* ===== SNAPSHOTS ===== */
 function snapshotsView(){
  var rows=SNAPS.map(function(s){return '<div class="snaprow selectable" data-kind="snap" data-id="'+s.id+'"><i class="ti ti-camera" style="color:var(--i55)" aria-hidden="true"></i><span class="snap">'+s.id+'</span><span class="op">'+s.op+'</span><span class="when">'+s.when+'</span></div>';}).join('');
  var master='<div class="ptitle"><span>'+t('snapsT')+'</span><span class="cnt2">.mgr-state</span></div>'+rows;
  return split(master,empty('ti-history',t('selSnap')));
 }
 function snapDetail(id){var s=SNAPS.filter(function(x){return x.id===id;})[0];if(!s)return '';
  var files=s.files.map(function(f){return '<div>'+esc(f)+'</div>';}).join('');
  return '<div class="dhead"><div class="dname" style="font-size:13px">'+s.id+'</div><div class="dsub"><span class="b kindb">'+s.when+'</span></div></div>'
   +'<div class="dsec"><div class="dsec-t">'+t('captured')+'</div><div style="font-size:12.5px;color:var(--ink)">'+esc(s.op)+'</div></div>'
   +'<div class="dsec"><div class="dsec-t">'+t('files')+'</div><div class="flist">'+files+'</div></div>'
   +'<div class="dacts"><button class="iact" data-act="restore"><i class="ti ti-arrow-back-up" aria-hidden="true"></i> '+t('restore')+'</button></div><div class="dpv" id="dpv"></div>';
 }
 function wireSnap(id){R.querySelector('.dacts .iact').onclick=function(){preview(t('restore')+' '+id,'~/.claude','(current state)','restored from '+id);};}
 /* ===== shared ===== */
 function preview(title,file,from,to){
  var dpv=R.querySelector('#dpv');if(!dpv)return;
  dpv.innerHTML='<div class="pvh"><i class="ti ti-eye" aria-hidden="true"></i>dry-run · '+esc(title)+'</div><div class="diff"><div class="dl ctx">'+esc(file)+'</div><div class="dl del">- '+esc(from)+'</div><div class="dl add">+ '+esc(to)+'</div></div><div class="note"><i class="ti ti-camera" aria-hidden="true"></i>'+t('snapL').replace('{s}',SNAP)+'</div><div class="btns"><button class="btn ghost" id="cx">'+t('cancel')+'</button><button class="btn primary" id="cf"><i class="ti ti-check" aria-hidden="true"></i> '+t('confirm')+'</button></div>';
  if(g&&!reduce){g.from(dpv,{autoAlpha:0,y:8});g.from(dpv.querySelectorAll('.dl'),{autoAlpha:0,x:-8,stagger:0.05,delay:0.05});}
  R.querySelector('#cx').onclick=function(){dpv.innerHTML='';};
  R.querySelector('#cf').onclick=function(){dpv.innerHTML='<div class="ok2"><i class="ti ti-circle-check" aria-hidden="true"></i>'+esc(title)+' · <span class="snap">'+SNAP+'</span></div>';};
 }
 var DETAIL={skill:skillDetail,agent:itemDetail,command:itemDetail,mcp:itemDetail,plugin:itemDetail,cmp:cmpDetail,chk:chkDetail,snap:snapDetail};
 var WIRE={skill:wireSkill,agent:wireItem,command:wireItem,mcp:wireItem,plugin:wireItem,snap:wireSnap};
 function bindSelectables(){R.querySelectorAll('.selectable').forEach(function(el){el.onclick=function(){
   R.querySelectorAll('.selectable').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');
   var kind=el.getAttribute('data-kind'),id=el.getAttribute('data-id'),insp=R.querySelector('#insp');
   insp.innerHTML=DETAIL[kind](id,kind);if(WIRE[kind])WIRE[kind](id,kind);
   if(g&&!reduce)g.from(insp,{autoAlpha:0,x:8,duration:0.2});
  };});}
 function bindKindSwitch(){R.querySelectorAll('.kbtn').forEach(function(b){b.onclick=function(){
   KIND=b.getAttribute('data-k');
   R.querySelectorAll('.kbtn').forEach(function(x){x.classList.remove('on');});b.classList.add('on');
   R.querySelector('#ktable').innerHTML=kindTable();
   R.querySelector('#insp').innerHTML=empty('ti-click',t('selRow'));
   bindSelectables();
   if(g&&!reduce)g.from(R.querySelectorAll('#ktable .selectable'),{autoAlpha:0,x:-8,stagger:0.03,ease:'power3.out'});
  };});}
 function countAll(){R.querySelectorAll('[data-count]').forEach(function(el){var to=+el.getAttribute('data-count');if(!g||reduce){el.textContent=to.toLocaleString();return;}var o={v:0};g.to(o,{v:to,duration:0.8,ease:'expo.out',onUpdate:function(){el.textContent=Math.round(o.v).toLocaleString();}});});}
 function intro(v){
  if(g&&!reduce){g.from(R.querySelectorAll('.kpi'),{autoAlpha:0,y:8,stagger:0.04,ease:'power3.out'});g.from(R.querySelectorAll('.selectable'),{autoAlpha:0,x:-8,stagger:0.03,ease:'power3.out',delay:0.08});g.from(R.querySelectorAll('.cmp-row'),{autoAlpha:0,y:8,stagger:0.04,delay:0.05});g.from(R.querySelectorAll('.seg'),{scaleX:0,duration:0.7,stagger:0.025,ease:'power3.out',delay:0.1});g.from(R.querySelector('.health'),{autoAlpha:0,y:8});}
  if(v==='doctor'){countAll();var arc=R.querySelector('#arc');if(arc){var C=2*Math.PI*46;if(g&&!reduce)g.fromTo(arc,{strokeDashoffset:C},{strokeDashoffset:C*0.08,duration:1.1,ease:'power3.out'});else arc.setAttribute('stroke-dashoffset',(C*0.08).toFixed(1));}}
  else if(v==='dashboard')countAll();
 }
 function mount(v){VIEW=v;main.innerHTML=(v==='dashboard'?dashboardView():v==='compare'?compareView():v==='doctor'?doctorView():snapshotsView());bindSelectables();bindKindSwitch();intro(v);R.querySelector('#vname').textContent=t(v);R.querySelector('.vtitle .ti').className='ti '+VIC[v];}
 function refresh(){R.querySelector('#bLive').textContent=t('live');R.querySelector('#bLock').textContent=t('unlocked');R.querySelectorAll('.nav button').forEach(function(b){b.querySelector('span').textContent=t(b.getAttribute('data-v'));});mount(VIEW);}
 R.querySelectorAll('.nav button').forEach(function(b){b.onclick=function(){R.querySelectorAll('.nav button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');mount(b.getAttribute('data-v'));};});
 R.querySelectorAll('.targets button').forEach(function(b){b.onclick=function(){R.querySelectorAll('.targets button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');TARGET=b.getAttribute('data-t');R.querySelector('#crumb').textContent=DATA[TARGET].path;R.querySelector('#sPath').textContent=DATA[TARGET].path;if(VIEW==='dashboard')mount('dashboard');};});
 R.querySelectorAll('.lang button').forEach(function(b){b.onclick=function(){LANG=b.getAttribute('data-l');R.querySelectorAll('.lang button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');refresh();};});
 R.querySelector('#theme').onclick=function(){var dark=body.getAttribute('data-theme')==='dark';body.setAttribute('data-theme',dark?'light':'dark');this.querySelector('i').className='ti '+(dark?'ti-moon':'ti-sun');};
 R.querySelector('#ssearch').oninput=function(){var q=this.value.toLowerCase();if(VIEW!=='dashboard')R.querySelector('.nav button[data-v=dashboard]').click();setTimeout(function(){R.querySelectorAll('tbody tr.selectable').forEach(function(tr){tr.style.display=tr.getAttribute('data-id').indexOf(q)<0?'none':'';});},0);};
 mount('dashboard');
})();
</script>
</body>
</html>
