 function dashboardView(){
  var k=KPI.map(function(r){var dc=r[3];return '<div class="kpi"><div class="kr"><span class="lab">'+t(r[0])+'</span><span class="delta '+dc+'"><i class="ti '+(dc==='up'?'ti-arrow-up-right':dc==='down'?'ti-arrow-down-right':'ti-minus')+'" aria-hidden="true"></i>'+r[2]+'</span></div>'+num(r[1])+'</div>';}).join('');
  var rows=SK.map(function(r){var on=r[1]===1;return '<tr data-n="'+r[0]+'"><td class="nm">'+r[0]+'</td><td class="kind">'+t('skw')+'</td><td><span class="st '+(on?'on':'off')+'"><i class="ti '+(on?'ti-check':'ti-minus')+'" aria-hidden="true"></i>'+(on?t('enabled'):t('disabled'))+'</span></td><td style="text-align:right"><button class="act" data-nm="'+r[0]+'"'+(on?'':' data-en="1"')+'>'+(on?t('disable'):t('enable'))+'</button></td></tr>';}).join('');
  return '<div class="view"><p class="lead">'+t('leadD')+'</p>'
   +'<dl class="kpis">'+k+'</dl>'
   +'<div class="strip"><span class="hd"><i class="ti ti-git-compare" aria-hidden="true"></i>'+t('compare')+'</span><span><b>claude 366</b> · <b>codex 517</b></span><span class="leg"><span class="sw" style="background:var(--idec)"></span>223 '+t('conly')+'</span><span class="leg"><span class="sw" style="background:var(--info)"></span>385 '+t('xonly')+'</span><span class="leg"><span class="sw" style="background:var(--ok)"></span>20 '+t('both')+'</span></div>'
   +'<div class="split"><div class="vmain"><div class="thead"><p class="stitle">'+t('skillsHdr')+'</p><div class="tright"><span class="cnt" id="cnt"></span><label class="flt"><i class="ti ti-search" aria-hidden="true"></i><input id="flt" type="text" placeholder="'+t('filter')+'" aria-label="'+t('filter')+'"></label></div></div>'
   +'<div class="tablewrap"><table><thead><tr><th>'+t('cName')+'</th><th>'+t('cKind')+'</th><th>'+t('cStatus')+'</th><th class="r">'+t('cAction')+'</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'
   +'<aside class="rail"><div class="preview" id="pv" aria-live="polite"><div class="ph"><i class="ti ti-click" aria-hidden="true"></i>'+t('idle')+'</div></div></aside></div></div>';
 }
 function compareView(){
  var rows=CMP.map(function(r){var tot=r[1]+r[2]+r[3]||1,p=function(n){return (n/tot*100).toFixed(1);};
   return '<div class="cmp-row"><div class="cmp-top"><span class="nm2">'+r[0]+'</span><span class="ct">'+r[1]+' · '+r[2]+' · '+r[3]+'</span></div><div class="bar"><div class="seg" style="width:'+p(r[1])+'%;background:var(--idec)"></div><div class="seg" style="width:'+p(r[2])+'%;background:var(--ok)"></div><div class="seg" style="width:'+p(r[3])+'%;background:var(--info)"></div></div></div>';}).join('');
  var dv=DIV.map(function(d){var x=d[2]==='x';return '<div class="dv"><span class="dk">'+d[0]+'</span><span class="nm">'+d[1]+'</span><span class="pc '+(x?'x':'c')+'">'+(x?t('xonly'):t('conly'))+'</span></div>';}).join('');
  return '<div class="view"><p class="lead">'+t('leadC')+'</p>'
   +'<div class="strip"><span><b>claude 366</b> · <b>codex 517</b> · <b>815</b> '+t('diverg')+'</span><span class="leg"><span class="sw" style="background:var(--idec)"></span>'+t('conly')+'</span><span class="leg"><span class="sw" style="background:var(--ok)"></span>'+t('both')+'</span><span class="leg"><span class="sw" style="background:var(--info)"></span>'+t('xonly')+'</span></div>'
   +'<p class="stitle" style="margin-bottom:16px">'+t('byKind')+'</p>'+rows
   +'<div class="note"><i class="ti ti-info-circle" aria-hidden="true"></i>'+t('caveat')+'</div>'
   +'<p class="stitle" style="margin:'+'40px 0 14px">'+t('divItems')+'</p><div class="dvwrap">'+dv+'</div></div>';
 }
 function doctorView(){
  var C=2*Math.PI*54;
  var checks=CHK.map(function(c){var w=c[2]===1;return '<div class="chk"><i class="ti '+(w?'ti-alert-triangle':'ti-circle-check')+' ico" style="color:'+(w?'var(--warn)':'var(--ok)')+'" aria-hidden="true"></i><span class="id">#'+c[0]+'</span><span class="nm" style="flex:1">'+c[1]+'</span><span class="st '+(w?'off':'on')+'" '+(w?'style="color:var(--warn);background:#f4ead2"':'')+'>'+(w?t('warn'):t('pass'))+'</span></div>';}).join('');
  return '<div class="view"><p class="lead">'+t('leadX')+'</p>'
   +'<div class="health"><div class="gauge"><svg viewBox="0 0 128 128" width="128" height="128" aria-hidden="true"><circle cx="64" cy="64" r="54" fill="none" stroke="#e5e2d8" stroke-width="11"/><circle id="arc" cx="64" cy="64" r="54" fill="none" stroke="var(--ok)" stroke-width="11" stroke-linecap="round" transform="rotate(-90 64 64)" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+C.toFixed(1)+'"/></svg><div class="score"><b data-count="92">0</b><span>'+t('health')+'</span></div></div>'
   +'<div class="hr"><div class="sev"><div><b style="color:#8a3417" data-count="0">0</b><span>'+t('error')+'</span></div><div><b style="color:var(--warn)" data-count="2">0</b><span>'+t('warn')+'</span></div><div><b style="color:var(--ok)" data-count="27">0</b><span>'+t('pass')+'</span></div></div><div class="sbar"><div class="sg" style="width:0;background:var(--ok)" data-w="93"></div><div class="sg" style="width:0;background:var(--warn)" data-w="7"></div></div></div></div>'
   +'<p class="stitle" style="margin-bottom:14px">'+t('checks')+'</p><div class="dvwrap">'+checks+'</div>'
   +'<div class="advice"><i class="ti ti-bulb" aria-hidden="true"></i><span>'+t('advice')+'</span></div></div>';
 }
 function countAll(){root.querySelectorAll('[data-count]').forEach(function(el){var to=+el.getAttribute('data-count');if(!g||reduce){el.textContent=to.toLocaleString();return;}var o={n:0};g.to(o,{n:to,duration:0.9,ease:'expo.out',onUpdate:function(){el.textContent=Math.round(o.n).toLocaleString();}});});}
 function magnetic(btn){if(!g||reduce||!btn)return;var qx=g.quickTo(btn,'x',{duration:0.4,ease:'power3'}),qy=g.quickTo(btn,'y',{duration:0.4,ease:'power3'});btn.addEventListener('mousemove',function(e){var r=btn.getBoundingClientRect();qx((e.clientX-(r.left+r.width/2))*0.3);qy((e.clientY-(r.top+r.height/2))*0.4);});btn.addEventListener('mouseleave',function(){qx(0);qy(0);});}
 function updCnt(){var vis=root.querySelectorAll('tbody tr:not([hidden])').length,c=root.querySelector('#cnt');if(c)c.textContent=t('showing').replace('{n}',vis);}
 function bindDash(){
  countAll();
  if(g&&!reduce){g.from(root.querySelectorAll('.kpi'),{y:12,autoAlpha:0,stagger:0.05,ease:'power3.out'});g.from(root.querySelector('.strip'),{autoAlpha:0,delay:0.1});g.from(root.querySelectorAll('tbody tr'),{x:-10,autoAlpha:0,stagger:0.04,ease:'power3.out',delay:0.15});}
  var flt=root.querySelector('#flt');if(flt)flt.oninput=function(){var q=flt.value.toLowerCase();root.querySelectorAll('tbody tr').forEach(function(tr){tr.hidden=tr.getAttribute('data-n').indexOf(q)<0;});updCnt();};updCnt();
  var pv=root.querySelector('#pv');
  function flip(b,on){var row=b.closest('tr'),st=row.querySelector('.st');st.className='st '+(on?'on':'off');st.innerHTML='<i class="ti '+(on?'ti-check':'ti-minus')+'" aria-hidden="true"></i>'+(on?t('enabled'):t('disabled'));b.textContent=on?t('disable'):t('enable');on?b.removeAttribute('data-en'):b.setAttribute('data-en','1');if(g&&!reduce)g.fromTo(row,{backgroundColor:'rgba(217,119,87,.18)'},{backgroundColor:'rgba(217,119,87,0)',duration:0.5,delay:0.15,ease:'power1.out'});}
  function idle(){pv.innerHTML='<div class="ph"><i class="ti ti-click" aria-hidden="true"></i>'+t('idle')+'</div>';if(g&&!reduce)g.from(pv.querySelector('.ph'),{autoAlpha:0});}
  root.querySelectorAll('.act').forEach(function(b){b.onclick=function(){
   var nm=b.getAttribute('data-nm'),en=b.hasAttribute('data-en'),vb=en?t('enable'):t('disable'),f=en?'false':'true',tv=en?'true':'false';
   pv.innerHTML='<div class="pvh"><i class="ti ti-eye" aria-hidden="true"></i>dry-run · '+vb+' <span class="nm">'+nm+'</span></div><div class="diff"><div class="dl ctx">[[skills.config]]</div><div class="dl ctx">  name = "'+nm+'"</div><div class="dl del">- enabled = '+f+'</div><div class="dl add">+ enabled = '+tv+'</div></div><div class="note"><i class="ti ti-camera" aria-hidden="true"></i>'+t('snap').replace('{s}',SNAP)+'</div><div class="btns"><button class="btn ghost" id="cx">'+t('cancel')+'</button><button class="btn primary" id="cf"><i class="ti ti-check" aria-hidden="true"></i> '+t('confirm')+' '+vb+'</button></div>';
   if(g&&!reduce){g.from(pv,{autoAlpha:0,y:10,ease:'power2.inOut'});g.from(pv.querySelectorAll('.dl'),{autoAlpha:0,x:-10,stagger:0.04,delay:0.06});}
   magnetic(pv.querySelector('#cf'));
   pv.querySelector('#cx').onclick=idle;
   pv.querySelector('#cf').onclick=function(){pv.innerHTML='<div class="ok"><i class="ti ti-circle-check" aria-hidden="true"></i>'+vb+' <span class="nm">'+nm+'</span> · <span class="snap">'+SNAP+'</span><button class="btn ghost" id="rb" style="margin-left:6px"><i class="ti ti-arrow-back-up" aria-hidden="true"></i> '+t('rollback')+'</button></div>';if(g&&!reduce)g.from(pv.querySelector('.ok'),{autoAlpha:0,y:8});flip(b,!en);pv.querySelector('#rb').onclick=function(){flip(b,en);idle();};};
  };});
 }
 function bindCompare(){if(g&&!reduce){g.from(root.querySelectorAll('.cmp-row'),{autoAlpha:0,y:12,stagger:0.05,ease:'power3.out'});g.from(root.querySelectorAll('.seg'),{scaleX:0,duration:0.8,stagger:0.03,ease:'power3.out',delay:0.1});g.from(root.querySelectorAll('.dv'),{autoAlpha:0,x:-10,stagger:0.04,delay:0.3,ease:'power3.out'});}}
 function bindDoctor(){countAll();var arc=root.querySelector('#arc');if(arc){var C=2*Math.PI*54;if(g&&!reduce)g.fromTo(arc,{strokeDashoffset:C},{strokeDashoffset:C*0.08,duration:1.2,ease:'power3.out'});else arc.setAttribute('stroke-dashoffset',(C*0.08).toFixed(1));}
  root.querySelectorAll('.sg').forEach(function(s){var w=s.getAttribute('data-w')+'%';if(g&&!reduce)g.to(s,{width:w,duration:1,ease:'power3.out',delay:0.2});else s.style.width=w;});
  if(g&&!reduce){g.from(root.querySelector('.health'),{autoAlpha:0,y:10});g.from(root.querySelectorAll('.chk'),{autoAlpha:0,x:-10,stagger:0.05,ease:'power3.out',delay:0.15});g.from(root.querySelector('.advice'),{autoAlpha:0,y:10,delay:0.35});}}
 function moveInd(){var a=root.querySelector('.tab.active');if(!a)return;var x=a.offsetLeft,w=a.offsetWidth;if(g&&!reduce)g.to(ind,{x:x,width:w,duration:0.4,ease:'power3.out'});else{ind.style.transform='translateX('+x+'px)';ind.style.width=w+'px';}}
 function mount(v){VIEW=v;main.innerHTML=(v==='dashboard'?dashboardView():v==='compare'?compareView():doctorView());if(g&&!reduce)g.from(main,{autoAlpha:0,y:8,duration:0.24});if(v==='dashboard')bindDash();else if(v==='compare')bindCompare();else bindDoctor();}
 function refreshHead(){root.querySelector('#bLive').textContent=t('live');root.querySelector('#bLock').textContent=t('unlocked');root.querySelector('#fSync').textContent=t('synced');root.querySelector('#fSnap').textContent=t('snaps');root.querySelectorAll('.tab').forEach(function(tb){tb.querySelector('span').textContent=t(tb.getAttribute('data-v'));});moveInd();}
 root.querySelectorAll('.tab').forEach(function(tb){tb.onclick=function(){root.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});tb.classList.add('active');moveInd();mount(tb.getAttribute('data-v'));};});
 root.querySelectorAll('.lang button').forEach(function(lb){lb.onclick=function(){LANG=lb.getAttribute('data-l');root.querySelectorAll('.lang button').forEach(function(x){x.classList.remove('on');});lb.classList.add('on');refreshHead();mount(VIEW);};});
 window.addEventListener('resize',function(){moveInd();});
 if(g&&!reduce)g.from(root.querySelector('.dot'),{scale:0,duration:0.5,ease:'back.out(2)'});
 mount('dashboard');setTimeout(moveInd,60);
})();
</script>
</body>
</html>
