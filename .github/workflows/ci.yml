name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: node / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Test suite
        run: npm test
      - name: Lint (SLOC ceiling)
        run: node src/cli.mjs selftest --lint
      - name: Import boundary (zero-network)
        run: node src/cli.mjs selftest --boundary

  web:
    name: web / ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install Web dependencies
        run: npm --prefix web ci
      - name: Web test suite
        run: npm --prefix web test
      - name: Web type check
        run: npm --prefix web run typecheck
      - name: Web production build
        run: npm --prefix web run build

  release-gate:
    name: release gate / ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Repository release gate
        run: node src/cli.mjs selftest --release-gate --base origin/main --format json

  tui:
    name: tui (go) / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: tui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
